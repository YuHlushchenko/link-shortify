name: Server CI

on:
  workflow_dispatch:
  push:
    paths:
      - "server/**"
  pull_request:
    paths:
      - "server/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: |
          cd server
          yarn lint

      - name: Test
        run: |
          cd server
          yarn test:unit

      - name: Typecheck
        run: |
          cd server
          yarn typecheck

      - name: Build
        run: |
          cd server
          yarn build

  integration:
    runs-on: ubuntu-latest

    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -s http://localhost:8000 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test integration
        working-directory: server
        run: yarn test:integration
