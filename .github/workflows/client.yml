name: Client CI

on:
  workflow_dispatch:
  push:
    paths:
      - "client/**"
      - "infrastructure/sst/**"
  pull_request:
    paths:
      - "client/**"
      - "infrastructure/sst/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: client
        run: yarn install --immutable

      # TODO: add Playwright visual/e2e tests step once Playwright is set up
      - name: Run tests
        working-directory: client
        run: yarn test:unit
        if: always()

      - name: Lint code
        working-directory: client
        run: |
          yarn lint
          yarn lint:prettier
          yarn lint:style
        if: always()

      - name: Build Next.js app
        working-directory: client
        run: yarn build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: eu-central-1
      STAGE: prod
      CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_COGNITO_DOMAIN: ${{ secrets.NEXT_PUBLIC_COGNITO_DOMAIN }}
      NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
      NEXT_PUBLIC_AUTH_LOGOUT_URL: ${{ secrets.NEXT_PUBLIC_AUTH_LOGOUT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Deploy
        working-directory: infrastructure/sst
        run: yarn sst deploy --stage ${{ env.STAGE }}
