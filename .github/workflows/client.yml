name: Client CI

on:
  workflow_dispatch:
  push:
    paths:
      - "client/**"
  pull_request:
    paths:
      - "client/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install pm2
        run: |
          npm install -g pm2

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          cd client
          yarn install --immutable

        if: always()
      - name: Run tests
        run: |
          cd client
          yarn test:unit

        if: always()
      # Storybook build + Loki screenshot testing disabled — Loki 0.35 is incompatible
      # with Storybook 10. Will be re-enabled after migrating to Playwright visual tests.
      # - name: Build Storybook
      #   run: |
      #     cd client
      #     yarn storybook:build
      # - name: Start Storybook
      #   run: |
      #     cd client
      #     pm2 start yarn --name "storybook" -- storybook
      # - name: Screenshot testing
      #   run: |
      #     cd client
      #     yarn test:ui:ci
      # - name: Stop Storybook
      #   run: |
      #     pm2 stop "storybook"
      - name: Lint code
        run: |
          cd client
          yarn lint
          yarn lint:prettier
          yarn lint:style

      - name: Build Next.js app
        run: |
          cd client
          yarn build
