name: Client CI

on:
  workflow_dispatch:
  push:
    paths:
      - "client/**"
  pull_request:
    paths:
      - "client/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          cd client
          yarn install --immutable

        if: always()
      - name: Run tests
        run: |
          cd client
          yarn test:unit

        if: always()
      # TODO: add Playwright visual/e2e tests step once Playwright is set up
      - name: Lint code
        run: |
          cd client
          yarn lint
          yarn lint:prettier
          yarn lint:style

      - name: Build Next.js app
        run: |
          cd client
          yarn build
