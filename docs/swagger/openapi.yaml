openapi: 3.0.3
info:
  title: Link-Shortify API
  description: |
    API for creating, managing, and tracking shortened links.

    Supports both anonymous and authenticated users. Anonymous users can create up to **5 active links**
    enforced per `SHA256(IP + browser fingerprint)`. Authenticated users have no creation limit
    but are subject to rate limiting.

    ## Authentication
    All endpoints except `GET /s/{slug}`, `POST /links/anonymous`, and `GET /links/anonymous`
    require a Cognito JWT token in the `Authorization` header.

    ## Rate Limiting
    Link creation endpoints enforce the following limits per user:

    | Window | Limit |
    |--------|-------|
    | Per minute | 10 requests |
    | Per day | 200 requests |
  version: 1.0.0

servers:
  - url: https://api.julab.space
    description: Production
  - url: https://dev-api.julab.space
    description: Development

tags:
  - name: Anonymous Links
    description: Link management for unauthenticated users
  - name: Auth
    description: Account and session management
  - name: Links
    description: Link management for authenticated users
  - name: Clicks
    description: Click tracking and analytics
  - name: Notifications
    description: In-app notifications
  - name: Redirect
    description: Public redirect endpoint

paths:
  /s/{slug}:
    get:
      tags:
        - Redirect
      summary: Redirect to original URL
      description: Redirects the visitor to the original URL. Records a click event with timestamp, country, referrer, and user agent.
      operationId: redirect
      parameters:
        - $ref: "#/components/parameters/SlugPath"
      responses:
        "302":
          description: Redirect to original URL
          headers:
            Location:
              schema:
                type: string
                format: uri
              example: https://example.com/very/long/url
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/Gone"

  /links/anonymous:
    post:
      tags:
        - Anonymous Links
      summary: Create anonymous link
      description: Creates a shortened link for an unauthenticated user. No Authorization header required.
      operationId: createAnonymousLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnonymousLinkRequest"
            example:
              fingerprint: "abc123def456"
              originalUrl: "https://example.com/very/long/url"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    get:
      tags:
        - Anonymous Links
      summary: Get anonymous links
      description: Returns all active anonymous links for the current browser session.
      operationId: getAnonymousLinks
      parameters:
        - name: fingerprint
          in: query
          required: true
          description: Browser fingerprint
          schema:
            type: string
          example: abc123def456
      responses:
        "200":
          description: List of anonymous links
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/claim:
    post:
      tags:
        - Auth
      summary: Claim anonymous links
      description: Transfers all anonymous links from the current browser session to the authenticated user's account.
      operationId: claimAnonymousLinks
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fingerprint
              properties:
                fingerprint:
                  type: string
                  description: Browser fingerprint
            example:
              fingerprint: "abc123def456"
      responses:
        "200":
          description: Links claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  claimed:
                    type: integer
                    description: Number of links claimed
              example:
                claimed: 3
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/account:
    delete:
      tags:
        - Auth
      summary: Delete account
      description: Deletes the authenticated user's Cognito account and all associated data.
      operationId: deleteAccount
      security:
        - CognitoAuth: []
      responses:
        "204":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /links:
    get:
      tags:
        - Links
      summary: Get all links
      description: Returns all shortened links for the authenticated user.
      operationId: getLinks
      security:
        - CognitoAuth: []
      parameters:
        - name: sortBy
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            enum: [createdAt, clickCount]
            default: createdAt
        - name: order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: string
            enum: [active, inactive, expired]
        - name: cursor
          in: query
          required: false
          description: Pagination cursor from previous response
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of links
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkResponse"
                  nextCursor:
                    type: string
                    description: Cursor for the next page
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Links
      summary: Create link
      description: Creates a new shortened link for the authenticated user.
      operationId: createLink
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
            example:
              originalUrl: "https://example.com/very/long/url"
              slug: "my-link"
              expiresAt: 1767225600
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags:
        - Links

      summary: Bulk delete links
      description: Deletes multiple links at once.
      operationId: bulkDeleteLinks
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - slugs
              properties:
                slugs:
                  type: array
                  items:
                    type: string
                  minItems: 1
            example:
              slugs: ["abc123", "my-link", "xyz789"]
      responses:
        "204":
          description: Links deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /links/{slug}:
    patch:
      tags:
        - Links
      summary: Update link
      description: Updates one or more attributes of a link.
      operationId: updateLink
      security:
        - CognitoAuth: []
      parameters:
        - $ref: "#/components/parameters/SlugPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
            example:
              status: "inactive"
      responses:
        "200":
          description: Link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/Gone"
    delete:
      tags:
        - Links
      summary: Delete link
      description: Marks a link as deleted. The slug is permanently reserved and cannot be reused.
      operationId: deleteLink
      security:
        - CognitoAuth: []
      parameters:
        - $ref: "#/components/parameters/SlugPath"
      responses:
        "204":
          description: Link deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/{slug}/clicks:
    get:
      tags:
        - Clicks
      summary: Get click history
      description: Returns the click history for a specific link.
      operationId: getClicks
      security:
        - CognitoAuth: []
      parameters:
        - $ref: "#/components/parameters/SlugPath"
        - name: from
          in: query
          required: false
          description: Unix timestamp — start of date range
          schema:
            type: integer
          example: 1748000000
        - name: to
          in: query
          required: false
          description: Unix timestamp — end of date range
          schema:
            type: integer
          example: 1748999999
        - name: cursor
          in: query
          required: false
          description: Pagination cursor from previous response
          schema:
            type: string
      responses:
        "200":
          description: Paginated click history
          content:
            application/json:
              schema:
                type: object
                properties:
                  clicks:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClickResponse"
                  nextCursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /notifications:
    get:
      tags:
        - Notifications
      summary: Get all notifications
      description: Returns all notifications for the authenticated user, sorted by date descending.
      operationId: getNotifications
      security:
        - CognitoAuth: []
      parameters:
        - name: unreadOnly
          in: query
          required: false
          description: If true, returns only unread notifications
          schema:
            type: boolean
        - name: cursor
          in: query
          required: false
          description: Pagination cursor from previous response
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationResponse"
                  nextCursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags:
        - Notifications
      summary: Mark all notifications as read
      description: Marks all notifications for the authenticated user as read.
      operationId: markAllNotificationsRead
      security:
        - CognitoAuth: []
      responses:
        "204":
          description: All notifications marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{notificationId}:
    patch:
      tags:
        - Notifications
      summary: Mark notification as read
      description: Marks a single notification as read.
      operationId: markNotificationRead
      security:
        - CognitoAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          description: Notification ID
          schema:
            type: string
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  notificationId:
                    type: string
                  isRead:
                    type: boolean
              example:
                notificationId: "uuid"
                isRead: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    CognitoAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: AWS Cognito JWT access token

  parameters:
    SlugPath:
      name: slug
      in: path
      required: true
      description: Link slug
      schema:
        type: string
        pattern: '^[a-z0-9-_]{1,32}$'
      example: abc123

  schemas:
    CreateLinkRequest:
      type: object
      required:
        - originalUrl
      properties:
        originalUrl:
          type: string
          format: uri
          description: Destination URL
        slug:
          type: string
          pattern: '^[a-z0-9-_]{1,32}$'
          description: Custom slug. Auto-generated if not provided
        expiresAt:
          type: integer
          description: Unix timestamp for expiration

    CreateAnonymousLinkRequest:
      type: object
      required:
        - fingerprint
        - originalUrl
      properties:
        fingerprint:
          type: string
          description: Browser fingerprint (e.g. from FingerprintJS)
        originalUrl:
          type: string
          format: uri
          description: Destination URL
        slug:
          type: string
          pattern: '^[a-z0-9-_]{1,32}$'
          description: Custom slug. Auto-generated if not provided
        expiresAt:
          type: integer
          description: Unix timestamp for expiration

    UpdateLinkRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive]
          description: New link status
        expiresAt:
          nullable: true
          type: integer
          description: Unix timestamp. Pass null to remove expiration

    LinkResponse:
      type: object
      properties:
        slug:
          type: string
        originalUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, expired, deleted]
        createdAt:
          type: integer
          description: Unix timestamp
        updatedAt:
          type: integer
          description: Unix timestamp
        expiresAt:
          type: integer
          description: Unix timestamp (optional)
        clickCount:
          type: integer
      example:
        slug: abc123
        originalUrl: https://example.com
        status: active
        createdAt: 1735689600
        updatedAt: 1735689600
        expiresAt: 1767225600
        clickCount: 42

    ClickResponse:
      type: object
      properties:
        clickId:
          type: string
        clickedAt:
          type: integer
          description: Unix timestamp
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (e.g. UA)
        referrer:
          type: string
        userAgent:
          type: string
      example:
        clickId: "9jicKM63gNr3DgOqGVfww"
        clickedAt: 1748391837
        country: "UA"
        referrer: "https://twitter.com"
        userAgent: "Mozilla/5.0 ..."

    NotificationResponse:
      type: object
      properties:
        notificationId:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: integer
          description: Unix timestamp
      example:
        notificationId: "uuid"
        message: "Your link 'my-link' has expired and been deactivated."
        isRead: false
        createdAt: 1735689600

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Bad Request"
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Unauthorized"
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Access denied"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Not Found"
    Conflict:
      description: Slug already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Slug already exists"
    Gone:
      description: Link is inactive, deleted, or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Gone"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: "Rate limit exceeded"
